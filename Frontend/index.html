<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DM Panda | Certified Instagram DM Automation Tool</title>
    <meta name="description" content="Automate your Instagram DMs, comments, shares, and stories with DM Panda. Certified Meta Business Partner since 2021. No Facebook page required. Safe, simple, and affordable." />
    <meta name="keywords" content="instagram automation, instagram dm automation, comment auto reply, auto send message instagram, link in bio page, dm panda" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="DM Panda" />
    <meta name="theme-color" content="#833AB4" />
    <link rel="canonical" href="https://dmpanda.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dmpanda.com/" />
    <meta property="og:title" content="DM Panda | Certified Instagram DM Automation Tool" />
    <meta property="og:description" content="Automate your Instagram DMs, comments, shares, and stories with DM Panda. Certified Meta Business Partner since 2021. No Facebook page required." />
    <meta property="og:image" content="https://dmpanda.com/images/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dmpanda.com/" />
    <meta property="twitter:title" content="DM Panda | Certified Instagram DM Automation Tool" />
    <meta property="twitter:description" content="Automate your Instagram DMs, comments, shares, and stories with DM Panda. Certified Meta Business Partner since 2021." />
    <meta property="twitter:image" content="https://dmpanda.com/images/logo.png" />

    <!-- Resource hints: connect early to font + API origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Non-render-blocking font loading via media swap trick -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
